<!doctype html>
<html lang="id">
  <head>
    <!-- Metadata penting -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kartu Informasi Holografik</title>

    <!-- Memuat file CSS Bootstrap dari CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

    <!-- CSS kustom untuk gaya holografik -->
    <style>
      /* Latar belakang halaman yang gelap agar kontras dengan efek cahaya */
      body {
        background-color: #010409;
        color: #c9d1d9;
        font-family: sans-serif;
      }

      /* Container utama untuk menengahkan kartu di layar */
      .holographic-card-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      /* Gaya kustom untuk kartu itu sendiri */
      .holographic-card {
        background-color: transparent; /* Latar belakang transparan */
        border: 2px solid #38bdf8; /* Bingkai biru muda */
        border-radius: 15px; /* Sudut membulat */
        width: 100%;
        max-width: 450px; /* Lebar maksimal agar terlihat seperti kartu */
        padding: 25px;
        box-shadow: 
          0 0 10px rgba(56, 189, 248, 0.5), /* Cahaya luar tipis */
          inset 0 0 10px rgba(56, 189, 248, 0.3); /* Cahaya dalam tipis */
        position: relative;
        overflow: hidden; /* Untuk memotong dekorasi pseudo-element */
      }

      /* Baris horizontal kecil di pojok kiri atas untuk dekorasi */
      .holographic-card-bar {
        position: absolute;
        top: 10px;
        left: 10px;
        width: 100px;
        height: 2px;
        background-color: #38bdf8;
        border-radius: 2px;
        box-shadow: 0 0 5px rgba(56, 189, 248, 0.8);
      }

      /* Dekorasi pseudo-element di pojok kanan atas, meniru 'lipatan' */
      .holographic-card::before {
        content: '';
        position: absolute;
        top: -10px;
        right: -10px;
        width: 40px;
        height: 40px;
        background-color: #010409;
        border: 2px solid #38bdf8;
        transform: rotate(45deg);
        box-shadow: 
          0 0 5px rgba(56, 189, 248, 0.5),
          inset 0 0 5px rgba(56, 189, 248, 0.3);
      }

      /* Gaya untuk judul kartu */
      .holographic-card-title {
        color: #38bdf8; /* Warna teks biru muda */
        font-weight: bold;
        text-transform: uppercase; /* Huruf kapital semua */
        font-size: 1.1rem;
        margin-bottom: 20px;
        letter-spacing: 0.1em;
        text-shadow: 0 0 5px rgba(56, 189, 248, 0.8); /* Efek cahaya teks */
      }

      /* Gaya untuk teks konten utama */
      .holographic-card-text {
        font-size: 0.95rem;
        line-height: 1.6;
        color: #c9d1d9; /* Warna teks abu-abu muda */
        text-shadow: 0 0 3px rgba(56, 189, 248, 0.3); /* Efek cahaya teks yang lebih halus */
      }
    </style>
  </head>
  <body>

    <!-- Container utama -->
    <div class="holographic-card-container">
      <!-- Elemen kartu -->
      <div class="holographic-card">
        <!-- Dekorasi bilah atas -->
        <div class="holographic-card-bar"></div>
        <!-- Judul kartu -->
        <div class="holographic-card-title">INFORMASI</div>
        <!-- Teks konten kartu -->
        <div class="holographic-card-text">
          Indonesia adalah negara kepulauan terbesar di dunia yang terletak di Asia Tenggara dan Oceania, dengan keanekaragaman budaya, sumber daya alam, dan hayati yang melimpah.
        </div>
      </div>
    </div>

    <!-- Memuat file JavaScript Bootstrap dari CDN (diperlukan untuk beberapa komponen, tapi tidak untuk kartu ini) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  </body>
</html>
