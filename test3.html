<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Horizontal Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome untuk Ikon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #020710; /* Background luar super gelap */
            padding: 40px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Container utama pembungkus semua card */
        .hud-container {
            background-color: rgba(2, 15, 36, 0.7);
            border: 1px solid rgba(0, 162, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            box-shadow: inset 0 0 15px rgba(0, 162, 255, 0.1);
            position: relative;
        }

        /* Efek sudut luar terpotong khas sci-fi di ujung container utama */
        .hud-container::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border: 1px solid #005691;
            border-radius: 12px;
            pointer-events: none;
            clip-path: polygon(0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px));
        }

        /* Styling untuk masing-masing sub-card/badge */
        .hud-card {
            background: transparent;
            border: 1px solid rgba(0, 212, 255, 0.35);
            padding: 8px 16px;
            min-width: 140px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            /* Membuat efek sudut terpotong segi delapan */
            clip-path: polygon(5px 0%, calc(100% - 5px) 0%, 100% 5px, 100% calc(100% - 5px), calc(100% - 5px) 100%, 5px 100%, 0% calc(100% - 5px), 0% 5px);
            transition: all 0.3s ease;
        }

        .hud-card:hover {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
            background: rgba(0, 212, 255, 0.05);
        }

        /* Styling khusus Ikon */
        .hud-icon {
            color: #00d2ff;
            font-size: 1.5rem;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
        }

        /* Pembungkus Teks */
        .hud-text-group {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        /* Label Atas */
        .hud-label {
            color: #5c8ba6;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Nilai Bawah */
        .hud-value {
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 700;
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.3);
        }

        /* Khusus Card EKONOMI yang hanya punya 1 baris teks tengah */
        .hud-card-center-text {
            justify-content: center;
        }
        .hud-value-center {
            color: #00d2ff;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>

<div class="container my-5">
    <!-- Container Utama Horizontal -->
    <div class="hud-container d-flex flex-wrap gap-3 justify-content-between align-items-center">
        
        <!-- 1. EKONOMI -->
        <div class="hud-card flex-fill">
            <i class="fa-solid fa-chart-line hud-icon"></i>
            <div class="hud-text-group">
                <span class="hud-value-center">EKONOMI</span>
            </div>
        </div>

        <!-- 2. POPULASI -->
        <div class="hud-card flex-fill">
            <i class="fa-solid fa-users hud-icon"></i>
            <div class="hud-text-group">
                <span class="hud-label">POPULASI</span>
                <span class="hud-value">277 JT</span>
            </div>
        </div>

        <!-- 3. BAHASA -->
        <div class="hud-card flex-fill">
            <i class="fa-solid fa-comments hud-icon"></i>
            <div class="hud-text-group">
                <span class="hud-label">BAHASA</span>
                <span class="hud-value">738</span>
            </div>
        </div>

        <!-- 4. MATA UANG -->
        <div class="hud-card flex-fill">
            <i class="fa-solid fa-circle-dollar-to-slot hud-icon"></i>
            <div class="hud-text-group">
                <span class="hud-label">MATA UANG</span>
                <span class="hud-value">IDR</span>
            </div>
        </div>

        <!-- 5. PDB NOMINAL -->
        <div class="hud-card flex-fill">
            <i class="fa-solid fa-chart-bar hud-icon"></i>
            <div class="hud-text-group">
                <span class="hud-label">PDB NOMINAL</span>
                <span class="hud-value">USD 1.37 T</span>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
