<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indonesia AI Map</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="grid"></div>

<div class="frame">

    <header>

        <div class="title">
            <h1>INDONESIA</h1>
            <span>Artificial Intelligence Mapping System</span>
        </div>

        <div class="status">
            <div>STATUS</div>
            <div class="green"></div>
        </div>

    </header>


    <aside class="left-panel">

        <h3>DATA</h3>

        <ul>
            <li>Population</li>
            <li>Satellite</li>
            <li>Weather</li>
            <li>Ocean</li>
            <li>Military</li>
            <li>Transport</li>
            <li>Province</li>
        </ul>

    </aside>


    <main>

        <div class="map-container">

            <!-- nanti bisa diganti SVG Indonesia -->
            <img src="indonesia-map.png" class="map">

        </div>

    </main>

    <aside class="right-panel">

        <div class="radar">

            <div class="circle"></div>

        </div>

        <div class="info">

            <p>Longitude</p>
            <h2>120.25°</h2>

            <p>Latitude</p>
            <h2>-2.45°</h2>

        </div>

    </aside>


    <footer>

        <button>HOME</button>
        <button>MAP</button>
        <button>DATA</button>
        <button>AI</button>

    </footer>

</div>

<script src="app.js"></script>

</body>
</html>
